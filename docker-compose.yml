version: '3.8'

services:
  # MongoDB Replica Set (3 nodes)
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - jition-network

  mongo2:
    image: mongo:7.0
    container_name: mongo2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - jition-network

  mongo3:
    image: mongo:7.0
    container_name: mongo3
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - jition-network

  mongo-init:
    image: mongo:7.0
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    networks:
      - jition-network
    entrypoint: [ "bash", "-c", "sleep 5 && mongosh --host mongo1:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo1:27017\"}, {_id: 1, host: \"mongo2:27017\"}, {_id: 2, host: \"mongo3:27017\"}]})'" ]

  # Redis Sentinel (1 Master + 2 Replicas + 3 Sentinels)
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    networks:
      - jition-network

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    networks:
      - jition-network

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    networks:
      - jition-network

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26379:26379"
    networks:
      - jition-network

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26380:26379"
    networks:
      - jition-network

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26381:26379"
    networks:
      - jition-network

  # MinIO S3-Compatible Local Storage
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - jition-network

  # MailHog SMTP Server Trap
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    networks:
      - jition-network

  # JITION Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jition-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/jition?replicaSet=rs0
      - REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_MASTER_NAME=mymaster
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      - mongo-init
      - redis-sentinel-1
      - minio
      - mailhog
    networks:
      - jition-network

  # JITION Frontend Application (React Dev Server)
  frontend:
    image: node:20-alpine
    container_name: jition-frontend
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - jition-network

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  minio_data:

networks:
  jition-network:
    driver: bridge
