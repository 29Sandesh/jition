apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jition-backend-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: jition-backend
  policyTypes:
  - Ingress
  ingress:
  # Allow ingress traffic only from frontend pods
  - from:
    - podSelector:
        matchLabels:
          app: jition-frontend
    ports:
    - protocol: TCP
      port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jition-frontend-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: jition-frontend
  policyTypes:
  - Ingress
  ingress:
  # Allow ingress traffic from anywhere on port 8080 (public loadbalancer)
  - ports:
    - protocol: TCP
      port: 8080
