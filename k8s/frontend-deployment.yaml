apiVersion: apps/v1
kind: Deployment
metadata:
  name: jition-frontend
  namespace: default
  labels:
    app: jition-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jition-frontend
  template:
    metadata:
      labels:
        app: jition-frontend
    spec:
      containers:
      - name: frontend
        image: jition-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "300mo"
            memory: 256Mi
          requests:
            cpu: "100mo"
            memory: 128Mi
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101 # nginx user in alpine has UID 101
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
